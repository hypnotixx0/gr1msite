<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GR1M | Join</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="icon" type="image/png" href="gr1m-mark.png">
</head>
<body>
    <div class="bg-stage">
        <span class="grid-burn"></span>
        <span class="blade blade-one"></span>
        <span class="blade blade-two"></span>
        <span class="blade blade-three"></span>
    </div>

    <header class="site-header">
        <a class="brand" href="index.html" aria-label="GR1M home">
            <img src="gr1m-mark.png" alt="GR1M logo">

        </a>
        <nav class="nav-links" aria-label="Primary navigation">
            <a href="index.html">Home</a>

    <main>
        <section class="join-hero section-panel">
            <div class="discord-invite reveal">

                    <img src="gr1m-mark.png" alt="GR1M server icon">

                <div class="invite-content">
                    <p class="eyebrow">Discord invite</p>
                    <h1>Join the GR1M server</h1>
                    <p>The main server for everything GR1M related.</p>
                    <div class="server-stats">
                        <span><b>72</b> Members</span>
                    </div>
                </div>
                <a class="button primary invite-button" target="_blank" href="https://discord.gg/XF2dCnkXwg">Join Server</a>
            </div>

    <footer class="site-footer">
        <span>GR1M Esports</span>
        <a href="faq.html">Read FAQ</a>
